<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainPass - Creare cont</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<main class="auth-page">
    <section class="auth-info">
        <h1>TrainPass</h1>
        <p>Creează un cont și cumpără bilete de tren rapid, simplu și sigur.</p>
    </section>

    <section class="auth-card">
        <h2>Creare cont</h2>
        <p>Completează datele pentru a crea un cont de utilizator.</p>

        <label for="firstName">Prenume</label>
        <input id="firstName" type="text" placeholder="Prenume">

        <label for="lastName">Nume</label>
        <input id="lastName" type="text" placeholder="Nume">

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="exemplu@email.com">

        <label for="password">Parolă</label>
        <input id="password" type="password" placeholder="Parolă">

        <button id="btn-register">Creează cont</button>

        <p id="message" class="message error"></p>

        <p class="auth-link">
            Ai deja cont?
            <a href="login.html">Autentificare</a>
        </p>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/register.js"></script>

</body>
</html>
