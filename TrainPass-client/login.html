<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainPass - Autentificare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<main class="auth-page">
    <section class="auth-info">
        <h1>TrainPass</h1>
        <p>Caută curse, cumpără bilete și gestionează călătoriile tale rapid.</p>
    </section>

    <section class="auth-card">
        <h2>Autentificare</h2>
        <p>Alege tipul de cont și intră în aplicație.</p>

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="exemplu@email.com">

        <label for="password">Parolă</label>
        <input id="password" type="password" placeholder="Parolă">

        <div class="button-row">
            <button id="btn-login-customer">Intră ca utilizator</button>
            <button id="btn-login-admin" class="btn-dark">Intră ca administrator</button>
        </div>

        <p id="message" class="message error"></p>

        <p class="auth-link">
            Nu ai cont?
            <a href="register.html">Creează cont</a>
        </p>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
